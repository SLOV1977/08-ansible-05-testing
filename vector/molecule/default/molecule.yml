---
dependency:
  name: galaxy
driver:
  name: docker
platforms:  
  - name: ubuntu_latest
    image: ubuntu:latest
    dockerfile: Dockerfile.ubuntu.j2
    command: /lib/systemd/systemd
    privileged: true
    pre_build_image: false
  - name: oracle_8
    image: oraclelinux:8
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    dockerfile: Dockerfile.oracle.j2
