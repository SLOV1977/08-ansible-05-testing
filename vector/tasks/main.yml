---
- name: Ensure vector config directory exists
  file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'

- name: Download Vector .deb package
  get_url:
    url: "{{ vector_download_url }}"
    dest: "/tmp/vector.deb"

- name: Install Vector
  apt:
    deb: "/tmp/vector.deb"
    state: present

- name: Deploy vector config from template
  template:
    src: vector.toml.j2
    dest: "{{ vector_config_file }}"
    mode: '0644'

- name: Enable and start vector
  systemd:
    name: vector
    enabled: true
    state: started
